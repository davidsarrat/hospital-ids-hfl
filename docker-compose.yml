x-superexec-app: &superexec-app
  image: hospital-ids-hfl-superexec:${HFL_IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile_inline: |
      FROM flwr/superexec:${FLWR_VERSION:-1.29.0}
      USER root
      RUN apt-get update \
        && apt-get -y --no-install-recommends install build-essential \
        && rm -rf /var/lib/apt/lists/*
      USER app
      WORKDIR /app
      COPY --chown=app:app pyproject.toml README.md ./
      COPY --chown=app:app hfl_cicids ./hfl_cicids
      COPY --chown=app:app scripts ./scripts
      RUN python -m pip install -U --no-cache-dir \
        --index-url https://download.pytorch.org/whl/cpu \
        "torch>=2.3,<3.0"
      RUN python -m pip install -U --no-cache-dir .
      ENTRYPOINT ["flower-superexec"]

services:

  global-superlink:
    image: flwr/superlink:${FLWR_VERSION:-1.29.0}
    command:
      - --insecure
      - --isolation
      - process
    ports:
      - "39093:9093"

  global-superexec-serverapp:
    <<: *superexec-app
    command:
      - --insecure
      - --plugin-type
      - serverapp
      - --appio-api-address
      - global-superlink:9091
    volumes:
      - ./shared:/shared
    depends_on:
      - global-superlink

  region-eu-superlink:
    image: flwr/superlink:${FLWR_VERSION:-1.29.0}
    command:
      - --insecure
      - --isolation
