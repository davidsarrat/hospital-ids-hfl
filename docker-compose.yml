  hospital-eu-01-supernode:
    image: flwr/supernode:${FLWR_VERSION:-1.29.0}
    command:
      - --insecure
      - --superlink
      - region-eu-superlink:9092
      - --clientappio-api-address
      - 0.0.0.0:9094
      - --isolation
      - process
      - --node-config
      - 'role="hospital" region="region_eu" hospital-id="hospital_eu_01" data-dir="/data"'
    depends_on:
      - region-eu-superlink

  hospital-eu-01-superexec-clientapp:
